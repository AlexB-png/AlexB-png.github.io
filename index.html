<!DOCTYPE html>
<html lang="en">
<head >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander Brankin Portfolio</title>
</head>
<style>
    .split {
        height: 100%;
        width: 50%;
        position: fixed;
        z-index: 1;
        top: 0;
        overflow-x: hidden;
        padding-top: 0px;
    }
    /* Control the left side */
    .left {
        left: 0px;
        background-color: lightslategray;
    }

    /* Control the right side */
    .right {
        right: 0;
        background-color: lightgrey;
    }

    /* If you want the content centered horizontally and vertically */
    .centered {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    /* Style the image inside the centered container, if needed */
    .centered img {
        width: 150px;
        border-radius: 50%;
    }

</style>
<body style="background-color:lightgrey">
    

    <div class="split left">
        <div class="centered">
            <img src="images.png" height="140">
            <a href="https://github.com/AlexB-png/The-better-vending-machine">The Better vending Machine</a>
            <br><br>
        </div>
    </div>

    <div class="split right">
        <div class="centered">
            <img src="downloadd.png" height=120>
            <a href="https://github.com/AlexB-png/Coin-Count">Coin Count project</a>
            <br>
            
        </div>
    </div>
</body>
</html>
